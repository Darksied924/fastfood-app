<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Orders - FastFood Admin</title>
    <meta name="description" content="Manage all customer orders - view, update order status, and track deliveries">
    <meta name="author" content="FastFood Kenya">
    <meta name="theme-color" content="#ff6b35">
    <meta name="robots" content="noindex, nofollow">
    
    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://fastfood-app.com/admin/orders">
    <meta property="og:title" content="Orders - FastFood Admin">
    <meta property="og:description" content="Manage all customer orders - view, update order status, and track deliveries">
    <meta property="og:image" content="https://fastfood-app.com/images/og-admin-orders.jpg">
    <meta property="og:site_name" content="FastFood Kenya">
    
    <!-- Twitter -->
    <meta name="twitter:card" content="summary">
    <meta name="twitter:url" content="https://fastfood-app.com/admin/orders">
    <meta name="twitter:title" content="Orders - FastFood Admin">
    <meta name="twitter:description" content="Manage all customer orders - view, update order status, and track deliveries">
    <meta name="twitter:image" content="https://fastfood-app.com/images/og-admin-orders.jpg">
    
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <header></header>

    <main class="dashboard-container">
        <div class="dashboard-header">
            <h1>📦 Order Management</h1>
            <div class="user-role">ADMIN</div>
        </div>

        <div class="dashboard-card">
            <div style="display:flex; justify-content:space-between; align-items:center; gap:1rem; margin-bottom:1rem;">
                <h3 style="margin:0; border-bottom:none; padding:0;">All Orders</h3>
                <select id="orderStatusFilter" class="form-group" style="max-width:240px; margin:0;" data-tooltip="Filter orders by status">
                    <option value="">All statuses</option>
                    <option value="pending">Pending</option>
                    <option value="paid">Paid</option>
                    <option value="preparing">Preparing</option>
                    <option value="out_for_delivery">Out for Delivery</option>
                    <option value="delivered">Delivered</option>
                </select>
            </div>
            <div id="all-orders-list"></div>
        </div>
    </main>

    <footer></footer>

    <script src="/js/api.js"></script>
    <script src="/js/auth.js"></script>
    <script src="/js/app.js"></script>
    <script src="/js/admin-orders.js"></script>
</body>
</html>
