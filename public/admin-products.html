<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Products - FastFood Admin</title>
    <meta name="description" content="Manage menu products - add, edit, or remove items from your FastFood menu">
    <meta name="author" content="FastFood Kenya">
    <meta name="theme-color" content="#ff6b35">
    <meta name="robots" content="noindex, nofollow">
    
    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://fastfood-app.com/admin/products">
    <meta property="og:title" content="Products - FastFood Admin">
    <meta property="og:description" content="Manage menu products - add, edit, or remove items from your FastFood menu">
    <meta property="og:image" content="https://fastfood-app.com/images/og-admin-products.jpg">
    <meta property="og:site_name" content="FastFood Kenya">
    
    <!-- Twitter -->
    <meta name="twitter:card" content="summary">
    <meta name="twitter:url" content="https://fastfood-app.com/admin/products">
    <meta name="twitter:title" content="Products - FastFood Admin">
    <meta name="twitter:description" content="Manage menu products - add, edit, or remove items from your FastFood menu">
    <meta name="twitter:image" content="https://fastfood-app.com/images/og-admin-products.jpg">
    
    <link rel="stylesheet" href="/css/style.css">
    <link rel="icon" type="image/png" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='90' font-size='90'>🍔</text></svg>">
</head>
<body class="admin-products-page">
    <header></header>

    <main class="dashboard-container">
        <div class="dashboard-header">
            <h1>🍕 Product Management</h1>
            <div class="user-role">ADMIN</div>
        </div>

        <div class="dashboard-card">
            <div style="display:flex; justify-content:space-between; align-items:center; gap:1rem; margin-bottom:1rem;">
                <h3 style="margin:0; border-bottom:none; padding:0;">All Products</h3>
                <div style="display:flex; gap:0.6rem; flex-wrap:wrap;">
                    <button class="btn btn-secondary" onclick="showEditProductModal()" data-tooltip="Select and edit an existing product">Edit Product</button>
                    <button class="btn btn-primary" onclick="showAddProductModal()" data-tooltip="Add a new product to the menu">+ Add Product</button>
                </div>
            </div>
            <div id="products-list"></div>
        </div>
    </main>

    <div id="addProductModal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closeModal('addProductModal')" data-tooltip="Close this dialog">&times;</span>
            <h3>Add Product</h3>
            <form id="addProductForm">
                <div class="form-group">
                    <label for="productName">Product Name</label>
                    <input type="text" id="productName" name="name" required aria-describedby="productName-hint">
                    <span id="productName-hint" class="field-hint">Enter the name of the dish</span>
                </div>
                <div class="form-group">
                    <label for="productPrice">Price (KSh)</label>
                    <input type="number" id="productPrice" name="price" step="1" min="1" required aria-describedby="productPrice-hint">
                    <span id="productPrice-hint" class="field-hint">Set the price in Kenyan Shillings</span>
                </div>
                <div class="form-group">
                    <label for="productImage">Emoji</label>
                    <input type="text" id="productImage" name="image" value="🍔" aria-describedby="productImage-hint">
                    <span id="productImage-hint" class="field-hint">Choose an emoji to represent the dish</span>
                </div>
                <div class="form-group">
                    <label>
                        <input type="checkbox" name="available" checked> Available
                    </label>
                </div>
                <button type="submit" class="btn btn-primary btn-block" data-tooltip="Add this product to the menu">Create Product</button>
            </form>
        </div>
    </div>

    <div id="editProductModal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closeModal('editProductModal')" data-tooltip="Close this dialog">&times;</span>
            <h3>Edit Product</h3>
            <form id="editProductForm">
                <div class="form-group">
                    <label for="editProductSelect">Select Product</label>
                    <select id="editProductSelect" name="id" required></select>
                </div>
                <div class="form-group">
                    <label for="editProductName">Product Name</label>
                    <input type="text" id="editProductName" name="name" required>
                </div>
                <div class="form-group">
                    <label for="editProductPrice">Price (KSh)</label>
                    <input type="number" id="editProductPrice" name="price" step="1" min="1" required>
                </div>
                <div class="form-group">
                    <label for="editProductImage">Emoji</label>
                    <input type="text" id="editProductImage" name="image" value="🍔">
                </div>
                <div class="form-group">
                    <label>
                        <input type="checkbox" id="editProductAvailable" name="available"> Available
                    </label>
                </div>
                <div style="display:flex; gap:0.6rem;">
                    <button type="submit" class="btn btn-primary btn-block" data-tooltip="Save changes to this product">Save Changes</button>
                    <button type="button" id="deleteSelectedProductBtn" class="btn btn-secondary btn-block" data-tooltip="Remove this product from the menu">Delete Product</button>
                </div>
            </form>
        </div>
    </div>

    <footer></footer>

    <script src="/js/api.js"></script>
    <script src="/js/auth.js"></script>
    <script src="/js/app.js"></script>
    <script src="/js/admin-products.js"></script>
</body>
</html>
