<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Products - FastFood Admin</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <header></header>

    <main class="dashboard-container">
        <div class="dashboard-header">
            <h1>🍕 Product Management</h1>
            <div class="user-role">ADMIN</div>
        </div>

        <div class="dashboard-card">
            <div style="display:flex; justify-content:space-between; align-items:center; gap:1rem; margin-bottom:1rem;">
                <h3 style="margin:0; border-bottom:none; padding:0;">All Products</h3>
                <div style="display:flex; gap:0.6rem; flex-wrap:wrap;">
                    <button class="btn btn-secondary" onclick="showEditProductModal()">Edit Product</button>
                    <button class="btn btn-primary" onclick="showAddProductModal()">+ Add Product</button>
                </div>
            </div>
            <div id="products-list"></div>
        </div>
    </main>

    <div id="addProductModal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closeModal('addProductModal')">&times;</span>
            <h3>Add Product</h3>
            <form id="addProductForm">
                <div class="form-group">
                    <label for="productName">Product Name</label>
                    <input type="text" id="productName" name="name" required>
                </div>
                <div class="form-group">
                    <label for="productPrice">Price (KSh)</label>
                    <input type="number" id="productPrice" name="price" step="1" min="1" required>
                </div>
                <div class="form-group">
                    <label for="productImage">Emoji</label>
                    <input type="text" id="productImage" name="image" value="🍔">
                </div>
                <div class="form-group">
                    <label>
                        <input type="checkbox" name="available" checked> Available
                    </label>
                </div>
                <button type="submit" class="btn btn-primary btn-block">Create Product</button>
            </form>
        </div>
    </div>

    <div id="editProductModal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closeModal('editProductModal')">&times;</span>
            <h3>Edit Product</h3>
            <form id="editProductForm">
                <div class="form-group">
                    <label for="editProductSelect">Select Product</label>
                    <select id="editProductSelect" name="id" required></select>
                </div>
                <div class="form-group">
                    <label for="editProductName">Product Name</label>
                    <input type="text" id="editProductName" name="name" required>
                </div>
                <div class="form-group">
                    <label for="editProductPrice">Price (KSh)</label>
                    <input type="number" id="editProductPrice" name="price" step="1" min="1" required>
                </div>
                <div class="form-group">
                    <label for="editProductImage">Emoji</label>
                    <input type="text" id="editProductImage" name="image" value="🍔">
                </div>
                <div class="form-group">
                    <label>
                        <input type="checkbox" id="editProductAvailable" name="available"> Available
                    </label>
                </div>
                <div style="display:flex; gap:0.6rem;">
                    <button type="submit" class="btn btn-primary btn-block">Save Changes</button>
                    <button type="button" id="deleteSelectedProductBtn" class="btn btn-secondary btn-block">Delete Product</button>
                </div>
            </form>
        </div>
    </div>

    <footer></footer>

    <script src="/js/api.js"></script>
    <script src="/js/auth.js"></script>
    <script src="/js/app.js"></script>
    <script src="/js/admin-products.js"></script>
</body>
</html>
