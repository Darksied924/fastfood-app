<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Orders - FastFood</title>
    <meta name="description" content="Track all your FastFood orders and order history">
    <meta name="author" content="FastFood Kenya">
    <meta name="theme-color" content="#ff6b35">
    <meta name="robots" content="noindex, nofollow">
    
    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://fastfood-app.com/customer/orders">
    <meta property="og:title" content="My Orders - FastFood">
    <meta property="og:description" content="Track all your FastFood orders and order history">
    <meta property="og:image" content="https://fastfood-app.com/images/og-orders.jpg">
    <meta property="og:site_name" content="FastFood Kenya">
    
    <!-- Twitter -->
    <meta name="twitter:card" content="summary">
    <meta name="twitter:url" content="https://fastfood-app.com/customer/orders">
    <meta name="twitter:title" content="My Orders - FastFood">
    <meta name="twitter:description" content="Track all your FastFood orders and order history">
    <meta name="twitter:image" content="https://fastfood-app.com/images/og-orders.jpg">
    
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <header></header>

    <main class="dashboard-container">
        <div class="dashboard-header">
            <h1>Welcome, <span id="userName">User</span>!</h1>
            <div class="header-actions">
                <a href="/customer/menu" class="btn btn-secondary header-action-btn" data-tooltip="Browse menu items">Menu</a>
                <a href="/customer/cart" class="header-cart-btn" id="headerCartBtn" aria-label="Go to cart" data-tooltip="View your cart and checkout">
                    <span class="header-cart-icon">🛒</span>
                    <span class="header-cart-count" id="headerCartCount">0</span>
                </a>
            </div>
        </div>

        <div class="dashboard-card">
            <div style="display:flex; justify-content:space-between; align-items:center; gap:0.8rem; flex-wrap:wrap;">
                <h3 style="margin:0; border-bottom:none; padding:0;">📋 My Orders</h3>
            </div>
            <div id="customer-orders"></div>
        </div>
    </main>

    <!-- Floating Cart Button -->
    <a href="/customer/cart" class="floating-cart-btn" id="floatingCartBtn" aria-label="Go to cart">
        <span class="floating-cart-icon">🛒</span>
        <span class="floating-cart-label">Go to Cart</span>
        <span class="floating-cart-count" id="floatingCartCount">0</span>
    </a>

    <div id="paymentModal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closeModal('paymentModal')" data-tooltip="Close this dialog">&times;</span>
            <h3>💳 Simulate M-Pesa Payment</h3>
            <p>Order Total: <span id="paymentAmount">KSh 0</span></p>
            <form id="paymentForm">
                <input type="hidden" id="orderId" name="orderId">
                <div class="form-group">
                    <label for="phone">Phone Number</label>
                    <input type="tel" id="phone" name="phone" placeholder="254712345678" required aria-describedby="phone-hint">
                    <span id="phone-hint" class="field-hint">Enter your M-Pesa registered phone number</span>
                </div>
                <button type="submit" class="btn btn-primary btn-block" data-tooltip="Send payment request via M-Pesa">Simulate STK Push</button>
            </form>
        </div>
    </div>

    <footer></footer>

    <script src="/js/api.js"></script>
    <script src="/js/auth.js"></script>
    <script src="/js/cart.js"></script>
    <script src="/js/customer.js"></script>
    <script src="/js/app.js"></script>
</body>
</html>
