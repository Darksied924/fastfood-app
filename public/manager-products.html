<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Products - CraveDash Manager</title>
    <meta name="description" content="Manage product availability - mark items as unavailable when out of stock">
    <meta name="author" content="CraveDash Kenya">
    <meta name="theme-color" content="#ff6b35">
    <meta name="robots" content="noindex, nofollow">
    
    <link rel="stylesheet" href="/css/style.css">
    <link rel="icon" type="image/png" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='90' font-size='90'>🍔</text></svg>">
</head>
<body class="admin-products-page">
    <header></header>

    <main class="dashboard-container">
        <div class="dashboard-header">
            <h1>🍕 Product Availability</h1>
            <div class="user-role">MANAGER</div>
        </div>

        <div class="dashboard-card">
            <div style="display:flex; justify-content:space-between; align-items:center; gap:1rem; margin-bottom:1rem;">
                <h3 style="margin:0; border-bottom:none; padding:0;">Menu Items</h3>
                <div style="display:flex; gap:0.6rem;">
                    <button class="btn btn-secondary" onclick="filterProducts('all')">All</button>
                    <button class="btn btn-secondary" onclick="filterProducts('available')">Available</button>
                    <button class="btn btn-secondary" onclick="filterProducts('unavailable')">Unavailable</button>
                </div>
            </div>
            <div id="products-list"></div>
        </div>
    </main>

    <!-- Toast Notification -->
    <div id="toast" class="toast"></div>

    <footer></footer>

    <script src="/js/api.js"></script>
    <script src="/js/auth.js"></script>
    <script src="/js/app.js"></script>
    <script>
        let allProducts = [];
        
        // Check auth and role
        document.addEventListener('DOMContentLoaded', async () => {
            if (!auth.requireAuth()) return;
            if (!auth.requireRole('manager', '/dashboard')) return;
            
            await loadProducts();
        });

        async function loadProducts() {
            try {
                const response = await api.getProducts();
                allProducts = response.data;
                renderProducts(allProducts);
            } catch (error) {
                showToast('Failed to load products: ' + error.message, 'error');
            }
        }

        function renderProducts(products) {
            const container = document.getElementById('products-list');
            
            if (!products || products.length === 0) {
                container.innerHTML = '<p class="empty-products">No products found</p>';
                return;
            }

            container.innerHTML = `
                <table>
                    <thead>
                        <tr>
                            <th>Product</th>
                            <th>Price</th>
                            <th>Status</th>
                            <th>Action</th>
                        </tr>
                    </thead>
                    <tbody>
                        ${products.map(product => `
                            <tr>
                                <td>
                                    <div style="display:flex; align-items:center; gap:0.75rem;">
                                        <span style="font-size:1.5rem;">${product.image || '🍔'}</span>
                                        <span style="font-weight:600;">${product.name}</span>
                                    </div>
                                </td>
                                <td>
                                    <span style="color:#666;">KSh ${Number(product.price).toLocaleString()}</span>
                                </td>
                                <td>
                                    <span class="status-badge ${product.available ? 'status-available' : 'status-unavailable'}">
                                        ${product.available ? 'Available' : 'Unavailable'}
                                    </span>
                                </td>
                                <td>
                                    <button 
                                        class="btn ${product.available ? 'btn-secondary' : 'btn-primary'} btn-small" 
                                        onclick="toggleAvailability(${product.id}, ${!product.available})"
                                        data-tooltip="${product.available ? 'Mark as unavailable (out of stock)' : 'Mark as available'}"
                                    >
                                        ${product.available ? 'Mark Unavailable' : 'Mark Available'}
                                    </button>
                                </td>
                            </tr>
                        `).join('')}
                    </tbody>
                </table>
            `;
        }

        async function toggleAvailability(productId, newAvailability) {
            try {
                const response = await api.toggleProductAvailability(productId);
                if (response.success) {
                    const statusText = newAvailability ? 'available' : 'unavailable';
                    showToast(`Product marked as ${statusText}`, 'success');
                    await loadProducts();
                }
            } catch (error) {
                showToast('Failed to update: ' + error.message, 'error');
            }
        }

        function filterProducts(filter) {
            let filtered = allProducts;
            
            if (filter === 'available') {
                filtered = allProducts.filter(p => p.available);
            } else if (filter === 'unavailable') {
                filtered = allProducts.filter(p => !p.available);
            }
            
            renderProducts(filtered);
        }

        // Toast notification
        function showToast(message, type = 'info') {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.className = `toast show ${type}`;
            
            setTimeout(() => {
                toast.className = 'toast';
            }, 3000);
        }

        // Make functions globally available
        window.toggleAvailability = toggleAvailability;
        window.filterProducts = filterProducts;
    </script>
</body>
</html>
