<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - CraveDash</title>
    <meta name="description" content="Log in to your CraveDash account to order delicious food">
    <meta name="author" content="CraveDash Kenya">
    <meta name="theme-color" content="#ff6b35">
    <meta name="robots" content="noindex, nofollow">
    
    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://cravedash.app/login">
    <meta property="og:title" content="Login - CraveDash">
    <meta property="og:description" content="Log in to your CraveDash account to order delicious food">
    <meta property="og:image" content="https://cravedash.app/images/og-login.jpg">
    <meta property="og:site_name" content="CraveDash Kenya">
    
    <!-- Twitter -->
    <meta name="twitter:card" content="summary">
    <meta name="twitter:url" content="https://cravedash.app/login">
    <meta name="twitter:title" content="Login - CraveDash">
    <meta name="twitter:description" content="Log in to your CraveDash account to order delicious food">
    <meta name="twitter:image" content="https://cravedash.app/images/og-login.jpg">
    
    <link rel="stylesheet" href="/css/style.css">
    <link rel="icon" type="image/png" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='90' font-size='90'>🍔</text></svg>">
</head>
<body class="auth-page">
    <header></header>

    <main class="auth-container">
        <div class="auth-card animate-slide-up">
            <div class="auth-header">
                <div class="auth-logo">🍔</div>
                <h2>Welcome Back!</h2>
                <p>Log in to continue ordering delicious food</p>
            </div>
            
            <form id="loginForm" class="auth-form" novalidate>
                <div class="form-group floating-label">
                    <input type="email" id="email" name="email" required placeholder=" " autocomplete="email" aria-describedby="email-hint">
                    <label for="email">Email Address</label>
                    <span class="focus-border"></span>
                    <span class="field-error" id="email-error"></span>
                    <span id="email-hint" class="field-hint">Enter your registered email address</span>
                </div>
                
                <div class="form-group floating-label">
                    <input type="password" id="password" name="password" required placeholder=" " autocomplete="current-password" aria-describedby="password-hint">
                    <label for="password">Password</label>
                    <span class="focus-border"></span>
                    <button type="button" class="password-toggle" onclick="togglePassword('password')" data-tooltip="Toggle password visibility">👁️</button>
                    <span id="password-hint" class="field-hint">Enter your password</span>
                    <span class="field-error" id="password-error"></span>
                </div>
                
                <div class="form-options">
                    <label class="checkbox-container">
                        <input type="checkbox" name="remember" data-tooltip="Stay logged in on this device">
                        <span class="checkmark"></span>
                        Remember me
                    </label>
                    <a href="/forgot-password" class="forgot-link" data-tooltip="Reset your password via SMS">Forgot Password?</a>
                </div>
                
                <button type="submit" class="btn btn-primary btn-block btn-large" data-tooltip="Sign in to your account">
                    <span class="btn-text">Log In</span>
                    <span class="btn-loader" style="display: none;">⏳</span>
                </button>
            </form>
            
            <div class="auth-divider">
                <span>or</span>
            </div>
            
            <div class="social-login">
                <button id="googleFallbackBtn" class="social-btn google is-disabled" type="button" data-tooltip="Sign in with your Google account">
                    <span class="social-icon">G</span>
                    <span>Google</span>
                </button>
                <div id="googleSignInMount" class="google-signin-mount" hidden></div>
                <button id="facebookLoginBtn" class="social-btn facebook is-disabled" type="button" data-tooltip="Sign in with your Facebook account">
                    <span class="social-icon">f</span>
                    <span>Facebook</span>
                </button>
            </div>
            
            <p class="auth-footer">
                Don't have an account? <a href="/register" class="auth-link" data-tooltip="Create a new account">Sign Up</a>
            </p>
        </div>
    </main>

    <footer></footer>

    <!-- Toast Notification -->
    <div id="toast" class="toast"></div>

    <script src="/js/api.js"></script>
    <script src="/js/auth.js"></script>
    <script src="/js/app.js"></script>
    <script>
        // Toggle password visibility
        function togglePassword(inputId) {
            const input = document.getElementById(inputId);
            const type = input.getAttribute('type') === 'password' ? 'text' : 'password';
            input.setAttribute('type', type);
        }

        // Clear all field errors
        function clearFieldErrors() {
            document.querySelectorAll('.field-error').forEach(el => {
                el.textContent = '';
                el.style.display = 'none';
            });
            document.querySelectorAll('.form-group').forEach(el => {
                el.classList.remove('has-error');
            });
        }

        // Show field error
        function showFieldError(fieldId, message) {
            const errorEl = document.getElementById(fieldId + '-error');
            const formGroup = document.getElementById(fieldId).closest('.form-group');
            
            if (errorEl) {
                errorEl.textContent = message;
                errorEl.style.display = 'block';
            }
            if (formGroup) {
                formGroup.classList.add('has-error');
            }
        }

        // Show toast notification
        function showToast(message, type = 'info') {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.className = `toast show ${type}`;
            
            setTimeout(() => {
                toast.className = 'toast';
            }, 3000);
        }

        function completeLogin(response) {
            localStorage.setItem('token', response.data.token);
            localStorage.setItem('user', JSON.stringify({
                id: response.data.id,
                name: response.data.name,
                email: response.data.email,
                role: response.data.role
            }));

            showToast('Login successful! Redirecting...', 'success');

            setTimeout(() => {
                const redirectPath = response.data.role === 'customer'
                    ? '/customer/menu'
                    : (response.data.role === 'delivery' ? '/delivery/dashboard' : '/dashboard');
                window.location.href = redirectPath;
            }, 1000);
        }

        let facebookAuthConfig = null;

        async function loadGoogleScript() {
            if (window.google && window.google.accounts && window.google.accounts.id) {
                return;
            }

            await new Promise((resolve, reject) => {
                const existing = document.querySelector('script[data-google-identity]');
                if (existing) {
                    existing.addEventListener('load', resolve, { once: true });
                    existing.addEventListener('error', reject, { once: true });
                    return;
                }

                const script = document.createElement('script');
                script.src = 'https://accounts.google.com/gsi/client';
                script.async = true;
                script.defer = true;
                script.dataset.googleIdentity = 'true';
                script.onload = resolve;
                script.onerror = reject;
                document.head.appendChild(script);
            });
        }

        async function loadFacebookScript() {
            if (window.FB) {
                return;
            }

            await new Promise((resolve, reject) => {
                const deadline = Date.now() + 5000;
                const waitForSdk = () => {
                    if (window.FB) {
                        resolve();
                        return;
                    }

                    if (Date.now() >= deadline) {
                        reject(new Error('Facebook Sign-In script failed to load'));
                        return;
                    }

                    setTimeout(waitForSdk, 50);
                };

                const existing = document.querySelector('script[data-facebook-sdk]');
                if (existing) {
                    waitForSdk();
                    existing.addEventListener('error', reject, { once: true });
                    return;
                }

                const script = document.createElement('script');
                script.src = 'https://connect.facebook.net/en_US/sdk.js';
                script.async = true;
                script.defer = true;
                script.dataset.facebookSdk = 'true';
                script.onload = waitForSdk;
                script.onerror = reject;
                document.head.appendChild(script);
            });
        }

        async function handleGoogleCredentialResponse(googleResponse) {
            try {
                showToast('Signing in with Google...', 'info');
                const response = await api.googleLogin(googleResponse.credential);
                if (response.success) {
                    completeLogin(response);
                }
            } catch (error) {
                showToast(error.message || 'Google Sign-In failed', 'error');
            }
        }

        async function initializeGoogleSignIn() {
            const fallbackBtn = document.getElementById('googleFallbackBtn');
            const mount = document.getElementById('googleSignInMount');

            if (!fallbackBtn || !mount) {
                return;
            }

            fallbackBtn.addEventListener('click', () => {
                showToast('Google Sign-In is not available yet on this environment.', 'info');
            });

            try {
                const response = await api.getGoogleAuthConfig();
                const googleConfig = response.data || {};

                if (!googleConfig.enabled || !googleConfig.clientId) {
                    return;
                }

                await loadGoogleScript();

                if (!(window.google && window.google.accounts && window.google.accounts.id)) {
                    throw new Error('Google Sign-In script failed to load');
                }

                window.google.accounts.id.initialize({
                    client_id: googleConfig.clientId,
                    callback: handleGoogleCredentialResponse
                });

                mount.hidden = false;
                mount.classList.add('is-ready');
                fallbackBtn.style.display = 'none';

                window.google.accounts.id.renderButton(mount, {
                    theme: 'outline',
                    size: 'large',
                    shape: 'pill',
                    text: 'signin_with',
                    width: 240
                });
            } catch (error) {
                console.error('Google Sign-In initialization failed:', error);
            }
        }

        async function handleFacebookLoginClick() {
            if (!(facebookAuthConfig && facebookAuthConfig.enabled && window.FB)) {
                showToast('Facebook Sign-In is not available yet on this environment.', 'info');
                return;
            }

            window.FB.login(async (loginResponse) => {
                try {
                    const authResponse = loginResponse && loginResponse.authResponse;

                    if (!authResponse || !authResponse.accessToken) {
                        showToast('Facebook Sign-In was cancelled.', 'info');
                        return;
                    }

                    showToast('Signing in with Facebook...', 'info');
                    const response = await api.facebookLogin(authResponse.accessToken);

                    if (response.success) {
                        completeLogin(response);
                    }
                } catch (error) {
                    showToast(error.message || 'Facebook Sign-In failed', 'error');
                }
            }, {
                scope: 'public_profile,email',
                return_scopes: true
            });
        }

        async function initializeFacebookSignIn() {
            const facebookBtn = document.getElementById('facebookLoginBtn');

            if (!facebookBtn) {
                return;
            }

            facebookBtn.addEventListener('click', handleFacebookLoginClick);

            try {
                const response = await api.getFacebookAuthConfig();
                const config = response.data || {};

                if (!config.enabled || !config.appId) {
                    return;
                }

                await loadFacebookScript();

                if (!window.FB) {
                    throw new Error('Facebook Sign-In script failed to load');
                }

                window.FB.init({
                    appId: config.appId,
                    cookie: true,
                    xfbml: false,
                    version: config.apiVersion || 'v22.0'
                });

                facebookAuthConfig = config;
                facebookBtn.classList.remove('is-disabled');
            } catch (error) {
                console.error('Facebook Sign-In initialization failed:', error);
            }
        }

        // Client-side validation
        function validateLoginForm() {
            clearFieldErrors();
            let isValid = true;
            
            const email = document.getElementById('email');
            const password = document.getElementById('password');
            
            // Validate email
            if (!email.value.trim()) {
                showFieldError('email', 'Email address is required');
                isValid = false;
            } else if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email.value)) {
                showFieldError('email', 'Please enter a valid email address');
                isValid = false;
            }
            
            // Validate password
            if (!password.value) {
                showFieldError('password', 'Password is required');
                isValid = false;
            }
            
            return isValid;
        }

        // Enhanced form submission with validation
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            // Client-side validation first
            if (!validateLoginForm()) {
                return;
            }
            
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const submitBtn = e.target.querySelector('button[type="submit"]');
            const btnText = submitBtn.querySelector('.btn-text');
            const btnLoader = submitBtn.querySelector('.btn-loader');
            
            // Show loading state
            submitBtn.disabled = true;
            btnText.style.display = 'none';
            btnLoader.style.display = 'inline-block';
            
            try {
                const response = await api.login(email, password);
                
                if (response.success) {
                    completeLogin(response);
                } else {
                    showToast(response.message || 'Login failed', 'error');
                    
                    // Reset button
                    submitBtn.disabled = false;
                    btnText.style.display = 'inline';
                    btnLoader.style.display = 'none';
                }
            } catch (error) {
                // Handle validation errors from server
                if (error.response && error.response.data && error.response.data.errors) {
                    const errors = error.response.data.errors;
                    errors.forEach(err => {
                        if (err.field) {
                            showFieldError(err.field, err.message);
                        }
                    });
                    showToast('Please fix the errors below', 'error');
                } else if (error.response && error.response.data && error.response.data.message) {
                    showToast(error.response.data.message, 'error');
                } else {
                    showToast('Login failed: ' + error.message, 'error');
                }
                
                // Reset button
                submitBtn.disabled = false;
                btnText.style.display = 'inline';
                btnLoader.style.display = 'none';
            }
        });

        // Real-time validation on blur
        document.getElementById('email').addEventListener('blur', function() {
            if (!this.value.trim()) {
                showFieldError('email', 'Email address is required');
            } else if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(this.value)) {
                showFieldError('email', 'Please enter a valid email address');
            } else {
                const errorEl = document.getElementById('email-error');
                const formGroup = this.closest('.form-group');
                if (errorEl) {
                    errorEl.textContent = '';
                    errorEl.style.display = 'none';
                }
                if (formGroup) {
                    formGroup.classList.remove('has-error');
                }
            }
        });

        document.getElementById('password').addEventListener('blur', function() {
            if (!this.value) {
                showFieldError('password', 'Password is required');
            } else {
                const errorEl = document.getElementById('password-error');
                const formGroup = this.closest('.form-group');
                if (errorEl) {
                    errorEl.textContent = '';
                    errorEl.style.display = 'none';
                }
                if (formGroup) {
                    formGroup.classList.remove('has-error');
                }
            }
        });

        // Add floating label animations
        document.querySelectorAll('.floating-label input').forEach(input => {
            input.addEventListener('focus', () => {
                input.parentElement.classList.add('focused');
            });
            
            input.addEventListener('blur', () => {
                if (!input.value) {
                    input.parentElement.classList.remove('focused');
                }
            });
            
            // Check initial value
            if (input.value) {
                input.parentElement.classList.add('focused');
            }
        });

        initializeGoogleSignIn();
        initializeFacebookSignIn();
    </script>
</body>
</html>
