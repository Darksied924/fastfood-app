<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Users - FastFood Admin</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <header></header>

    <main class="dashboard-container">
        <div class="dashboard-header">
            <h1>👥 User Management</h1>
            <div class="user-role">ADMIN</div>
        </div>

        <div class="dashboard-card">
            <div style="display:flex; justify-content:space-between; align-items:center; gap:1rem; margin-bottom:1rem;">
                <h3 style="margin:0; border-bottom:none; padding:0;">Users by Role</h3>
                <button class="btn btn-primary" onclick="showAddUserModal()">+ Add User</button>
            </div>
            <div id="users-list"></div>
        </div>
    </main>

    <div id="addUserModal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closeModal('addUserModal')">&times;</span>
            <h3>Add User</h3>
            <form id="addUserForm">
                <div class="form-group">
                    <label for="newUserName">Name</label>
                    <input type="text" id="newUserName" name="name" required>
                </div>
                <div class="form-group">
                    <label for="newUserEmail">Email</label>
                    <input type="email" id="newUserEmail" name="email" required>
                </div>
                <div class="form-group">
                    <label for="newUserPassword">Password</label>
                    <input type="password" id="newUserPassword" name="password" required>
                </div>
                <div class="form-group">
                    <label for="newUserRole">Role</label>
                    <select id="newUserRole" name="role" required>
                        <option value="customer">Customer</option>
                        <option value="manager">Manager</option>
                        <option value="delivery">Delivery</option>
                        <option value="admin">Admin</option>
                    </select>
                </div>
                <button type="submit" class="btn btn-primary btn-block">Create User</button>
            </form>
        </div>
    </div>

    <footer></footer>

    <script src="/js/api.js"></script>
    <script src="/js/auth.js"></script>
    <script src="/js/app.js"></script>
    <script src="/js/admin-users.js"></script>
</body>
</html>
