<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Users - FastFood Admin</title>
    <meta name="description" content="Manage user accounts - create, edit, or remove users and assign roles">
    <meta name="author" content="FastFood Kenya">
    <meta name="theme-color" content="#ff6b35">
    <meta name="robots" content="noindex, nofollow">
    
    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://fastfood-app.com/admin/users">
    <meta property="og:title" content="Users - FastFood Admin">
    <meta property="og:description" content="Manage user accounts - create, edit, or remove users and assign roles">
    <meta property="og:image" content="https://fastfood-app.com/images/og-admin-users.jpg">
    <meta property="og:site_name" content="FastFood Kenya">
    
    <!-- Twitter -->
    <meta name="twitter:card" content="summary">
    <meta name="twitter:url" content="https://fastfood-app.com/admin/users">
    <meta name="twitter:title" content="Users - FastFood Admin">
    <meta name="twitter:description" content="Manage user accounts - create, edit, or remove users and assign roles">
    <meta name="twitter:image" content="https://fastfood-app.com/images/og-admin-users.jpg">
    
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <header></header>

    <main class="dashboard-container">
        <div class="dashboard-header">
            <h1>👥 User Management</h1>
            <div class="user-role">ADMIN</div>
        </div>

        <div class="dashboard-card">
            <div style="display:flex; justify-content:space-between; align-items:center; gap:1rem; margin-bottom:1rem;">
                <h3 style="margin:0; border-bottom:none; padding:0;">Users by Role</h3>
                <button class="btn btn-primary" onclick="showAddUserModal()" data-tooltip="Create a new user account">+ Add User</button>
            </div>
            <div id="users-list"></div>
        </div>
    </main>

    <div id="addUserModal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closeModal('addUserModal')" data-tooltip="Close this dialog">&times;</span>
            <h3>Add User</h3>
            <form id="addUserForm">
                <div class="form-group">
                    <label for="newUserName">Name</label>
                    <input type="text" id="newUserName" name="name" required aria-describedby="newUserName-hint">
                    <span id="newUserName-hint" class="field-hint">Enter user's full name</span>
                </div>
                <div class="form-group">
                    <label for="newUserEmail">Email</label>
                    <input type="email" id="newUserEmail" name="email" required aria-describedby="newUserEmail-hint">
                    <span id="newUserEmail-hint" class="field-hint">Enter user's email address</span>
                </div>
                <div class="form-group">
                    <label for="newUserPassword">Password</label>
                    <input type="password" id="newUserPassword" name="password" required aria-describedby="newUserPassword-hint">
                    <span id="newUserPassword-hint" class="field-hint">Set a secure password</span>
                </div>
                <div class="form-group">
                    <label for="newUserRole">Role</label>
                    <select id="newUserRole" name="role" required aria-describedby="newUserRole-hint">
                        <option value="customer">Customer</option>
                        <option value="manager">Manager</option>
                        <option value="delivery">Delivery</option>
                        <option value="admin">Admin</option>
                    </select>
                    <span id="newUserRole-hint" class="field-hint">Select user role (customer, manager, delivery, or admin)</span>
                </div>
                <button type="submit" class="btn btn-primary btn-block" data-tooltip="Create this user account">Create User</button>
            </form>
        </div>
    </div>

    <footer></footer>

    <script src="/js/api.js"></script>
    <script src="/js/auth.js"></script>
    <script src="/js/app.js"></script>
    <script src="/js/admin-users.js"></script>
</body>
</html>
