<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile - CraveDash</title>
    <meta name="description" content="View and manage your CraveDash account profile">
    <meta name="author" content="CraveDash Kenya">
    <meta name="theme-color" content="#ff6b35">
    <meta name="robots" content="noindex, nofollow">
    
    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://cravedash.app/profile">
    <meta property="og:title" content="Profile - CraveDash">
    <meta property="og:description" content="View and manage your CraveDash account profile">
    <meta property="og:image" content="https://cravedash.app/images/og-profile.jpg">
    <meta property="og:site_name" content="CraveDash Kenya">
    
    <!-- Twitter -->
    <meta name="twitter:card" content="summary">
    <meta name="twitter:url" content="https://cravedash.app/profile">
    <meta name="twitter:title" content="Profile - CraveDash">
    <meta name="twitter:description" content="View and manage your CraveDash account profile">
    <meta name="twitter:image" content="https://cravedash.app/images/og-profile.jpg">
    
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <header></header>

    <main class="dashboard-container profile-page">
        <div class="dashboard-header">
            <h1>My Profile</h1>
            <div class="user-role" id="profileRole">USER</div>
        </div>

        <section class="profile-panel-wrap">
            <div class="dashboard-card profile-card">
                <h3>Profile Details</h3>
                <div class="profile-avatar-section">
                    <img id="profileAvatarPreview" class="profile-avatar" alt="Profile image preview">
                    <input type="file" id="profileImage" class="profile-upload-input" accept="image/*">
                    <label id="profileImageLabel" for="profileImage" class="btn btn-secondary" style="display: none;" data-tooltip="Choose a new profile picture">Upload Image</label>
                    <small class="profile-image-help">JPG, PNG, WEBP up to 2MB</small>
                </div>

                <form id="profileForm">
                    <div class="profile-grid">
                        <div class="form-group">
                            <label for="profileName">Name</label>
                            <input type="text" id="profileName" name="name" required aria-describedby="profileName-hint">
                            <span id="profileName-hint" class="field-hint">Your display name</span>
                        </div>
                        <div class="form-group">
                            <label for="profileEmail">Email</label>
                            <input type="email" id="profileEmail" name="email" required aria-describedby="profileEmail-hint">
                            <span id="profileEmail-hint" class="field-hint">Your registered email address</span>
                        </div>
                        <div class="form-group">
                            <label for="profilePhone">Phone</label>
                            <input type="tel" id="profilePhone" name="phone" placeholder="0712345678" aria-describedby="profilePhone-hint">
                            <span id="profilePhone-hint" class="field-hint">Phone for M-Pesa payments</span>
                        </div>
                    </div>
                    <div class="profile-actions">
                        <button type="button" id="editProfileBtn" class="btn btn-secondary" data-tooltip="Enable editing your profile">Edit Profile</button>
                        <button type="submit" id="saveProfileBtn" class="btn btn-primary" style="display: none;" data-tooltip="Save changes to your profile">Save Profile</button>
                        <button type="button" id="cancelEditBtn" class="btn btn-secondary" style="display: none;" data-tooltip="Discard changes">Cancel</button>
                        <a class="btn btn-secondary" href="/dashboard" data-tooltip="Return to your dashboard">Back to Dashboard</a>
                    </div>
                </form>
            </div>
        </section>
    </main>

    <footer></footer>

    <script src="/js/api.js"></script>
    <script src="/js/auth.js"></script>
    <script src="/js/app.js"></script>
    <script src="/js/profile.js"></script>
</body>
</html>
