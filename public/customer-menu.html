<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Menu - CraveDash</title>
    <meta name="description" content="Browse our delicious menu and order your favorite fast food items">
    <meta name="author" content="CraveDash Kenya">
    <meta name="theme-color" content="#ff6b35">
    <meta name="robots" content="index, follow">
    
    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://cravedash.app/customer/menu">
    <meta property="og:title" content="Menu - CraveDash">
    <meta property="og:description" content="Browse our delicious menu and order your favorite fast food items">
    <meta property="og:image" content="https://cravedash.app/images/og-menu.jpg">
    <meta property="og:site_name" content="CraveDash Kenya">
    
    <!-- Twitter -->
    <meta name="twitter:card" content="summary">
    <meta name="twitter:url" content="https://cravedash.app/customer/menu">
    <meta name="twitter:title" content="Menu - CraveDash">
    <meta name="twitter:description" content="Browse our delicious menu and order your favorite fast food items">
    <meta name="twitter:image" content="https://cravedash.app/images/og-menu.jpg">
    
    <link rel="stylesheet" href="/css/style.css">
</head>
<body class="customer-menu-page">
    <header></header>

    <main class="dashboard-container">
        <div class="dashboard-header">
            <h1>Welcome, <span id="userName">User</span>!</h1>
            <div class="header-actions">
                <a href="/customer/orders" class="btn btn-secondary header-action-btn" data-tooltip="View your order history">My Orders</a>
                <a href="/customer/cart" class="header-cart-btn" id="headerCartBtn" aria-label="Go to cart" data-tooltip="View your cart and checkout">
                    <span class="header-cart-icon">🛒</span>
                    <span class="header-cart-count" id="headerCartCount">0</span>
                </a>
            </div>
        </div>

        <div class="dashboard-card">
            <div class="page-hero-image">
                <img src="/images/ui/dashboard-illustration.svg" alt="Browse menu illustration">
            </div>
            <div style="display:flex; justify-content:space-between; align-items:center; gap:0.8rem; flex-wrap:wrap;">
                <h3 style="margin:0; border-bottom:none; padding:0;">🍔 Browse Menu</h3>
            </div>
            <div class="product-grid" id="customer-products"></div>
        </div>
    </main>

    <!-- Floating Cart Button -->
    <a href="/customer/cart" class="floating-cart-btn" id="floatingCartBtn" aria-label="Go to cart">
        <span class="floating-cart-icon">🛒</span>
        <span class="floating-cart-label">Go to Cart</span>
        <span class="floating-cart-count" id="floatingCartCount">0</span>
    </a>

    <footer></footer>

    <script src="/js/api.js"></script>
    <script src="/js/auth.js"></script>
    <script src="/js/cart.js"></script>
    <script src="/js/customer.js"></script>
    <script src="/js/app.js"></script>
</body>
</html>
