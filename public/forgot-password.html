<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password - FastFood</title>
    <meta name="description" content="Reset your FastFood account password">
    <meta name="author" content="FastFood Kenya">
    <meta name="theme-color" content="#ff6b35">
    <meta name="robots" content="noindex, nofollow">
    
    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://fastfood-app.com/forgot-password">
    <meta property="og:title" content="Forgot Password - FastFood">
    <meta property="og:description" content="Reset your FastFood account password">
    <meta property="og:image" content="https://fastfood-app.com/images/og-forgot.jpg">
    <meta property="og:site_name" content="FastFood Kenya">
    
    <!-- Twitter -->
    <meta name="twitter:card" content="summary">
    <meta name="twitter:url" content="https://fastfood-app.com/forgot-password">
    <meta name="twitter:title" content="Forgot Password - FastFood">
    <meta name="twitter:description" content="Reset your FastFood account password">
    <meta name="twitter:image" content="https://fastfood-app.com/images/og-forgot.jpg">
    
    <link rel="stylesheet" href="/css/style.css">
    <link rel="icon" type="image/png" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='90' font-size='90'>🍔</text></svg>">
</head>
<body class="auth-page">
    <header></header>

    <main class="auth-container">
        <div class="auth-card animate-slide-up">
            <div class="auth-header">
                <div class="auth-logo">🔑</div>
                <h2>Forgot Password?</h2>
                <p>Enter your email and we'll send you a reset link</p>
            </div>
            
            <form id="forgotPasswordForm" class="auth-form" novalidate>
                <div class="form-group floating-label">
                    <input type="email" id="email" name="email" required placeholder=" " autocomplete="email" aria-describedby="email-hint">
                    <label for="email">Email Address</label>
                    <span class="focus-border"></span>
                    <span class="field-error" id="email-error"></span>
                    <span id="email-hint" class="field-hint">Enter your registered email to receive a reset link</span>
                </div>
                
                <button type="submit" class="btn btn-primary btn-block btn-large" data-tooltip="Send password reset link to your email">
                    <span class="btn-text">Send Reset Link</span>
                    <span class="btn-loader" style="display: none;">⏳</span>
                </button>
            </form>
            
            <p class="auth-footer">
                Remember your password? <a href="/login" class="auth-link" data-tooltip="Log in with your existing password">Log In</a>
            </p>
        </div>
    </main>

    <footer></footer>

    <!-- Toast Notification -->
    <div id="toast" class="toast"></div>

    <script src="/js/api.js"></script>
    <script src="/js/auth.js"></script>
    <script src="/js/app.js"></script>
    <script>
        // Clear all field errors
        function clearFieldErrors() {
            document.querySelectorAll('.field-error').forEach(el => {
                el.textContent = '';
                el.style.display = 'none';
            });
            document.querySelectorAll('.form-group').forEach(el => {
                el.classList.remove('has-error');
            });
        }

        // Show field error
        function showFieldError(fieldId, message) {
            const errorEl = document.getElementById(fieldId + '-error');
            const formGroup = document.getElementById(fieldId).closest('.form-group');
            
            if (errorEl) {
                errorEl.textContent = message;
                errorEl.style.display = 'block';
            }
            if (formGroup) {
                formGroup.classList.add('has-error');
            }
        }

        // Clear specific field error
        function clearFieldError(fieldId) {
            const errorEl = document.getElementById(fieldId + '-error');
            const formGroup = document.getElementById(fieldId).closest('.form-group');
            
            if (errorEl) {
                errorEl.textContent = '';
                errorEl.style.display = 'none';
            }
            if (formGroup) {
                formGroup.classList.remove('has-error');
            }
        }

        // Show toast notification
        function showToast(message, type = 'info') {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.className = `toast show ${type}`;
            
            setTimeout(() => {
                toast.className = 'toast';
            }, 3000);
        }

        // Client-side validation
        function validateForgotPasswordForm() {
            clearFieldErrors();
            let isValid = true;
            
            const email = document.getElementById('email');
            
            // Validate email
            if (!email.value.trim()) {
                showFieldError('email', 'Email address is required');
                isValid = false;
            } else if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email.value)) {
                showFieldError('email', 'Please enter a valid email address');
                isValid = false;
            }
            
            return isValid;
        }

        // Enhanced form submission with loading state
        document.getElementById('forgotPasswordForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            // Client-side validation first
            if (!validateForgotPasswordForm()) {
                return;
            }
            
            const email = document.getElementById('email').value.trim();
            
            const submitBtn = e.target.querySelector('button[type="submit"]');
            const btnText = submitBtn.querySelector('.btn-text');
            const btnLoader = submitBtn.querySelector('.btn-loader');
            
            // Show loading state
            submitBtn.disabled = true;
            btnText.style.display = 'none';
            btnLoader.style.display = 'inline-block';
            
            try {
                const response = await api.forgotPassword(email);
                
                if (response.success) {
                    showToast('If your email is registered, you will receive a reset link.', 'success');
                    console.log('Reset Token (for demo):', response.data.resetToken);
                    
                    setTimeout(() => {
                        window.location.href = '/login';
                    }, 3000);
                } else {
                    showToast(response.message || 'Request failed', 'error');
                    
                    // Reset button
                    submitBtn.disabled = false;
                    btnText.style.display = 'inline';
                    btnLoader.style.display = 'none';
                }
            } catch (error) {
                // Handle validation errors from server
                if (error.response && error.response.data && error.response.data.errors) {
                    const errors = error.response.data.errors;
                    errors.forEach(err => {
                        if (err.field) {
                            showFieldError(err.field, err.message);
                        }
                    });
                } else if (error.response && error.response.data && error.response.data.message) {
                    showToast(error.response.data.message, 'error');
                } else {
                    showToast('Request failed: ' + error.message, 'error');
                }
                
                // Reset button
                submitBtn.disabled = false;
                btnText.style.display = 'inline';
                btnLoader.style.display = 'none';
            }
        });

        // Real-time validation on blur
        document.getElementById('email').addEventListener('blur', function() {
            if (!this.value.trim()) {
                showFieldError('email', 'Email address is required');
            } else if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(this.value)) {
                showFieldError('email', 'Please enter a valid email address');
            } else {
                clearFieldError('email');
            }
        });

        // Add floating label animations
        document.querySelectorAll('.floating-label input').forEach(input => {
            input.addEventListener('focus', () => {
                input.parentElement.classList.add('focused');
            });
            
            input.addEventListener('blur', () => {
                if (!input.value) {
                    input.parentElement.classList.remove('focused');
                }
            });
            
            // Check initial value
            if (input.value) {
                input.parentElement.classList.add('focused');
            }
        });
    </script>
</body>
</html>
